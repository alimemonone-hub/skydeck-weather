<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Skydeck — Weather</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="style.css" />
</head>
<body data-theme="light">

  <div class="app">

    <!-- ============ SIDEBAR ============ -->
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-mark">◐</span>
        <span class="brand-name">Skydeck</span>
      </div>

      <div class="search-box">
        <input id="citySearchInput" type="text" placeholder="Search a city…" autocomplete="off" />
        <button id="locateBtn" title="Use my location" aria-label="Use my current location">
          <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M12 2a1 1 0 0 1 1 1v1.06A8.004 8.004 0 0 1 19.94 11H21a1 1 0 1 1 0 2h-1.06A8.004 8.004 0 0 1 13 19.94V21a1 1 0 1 1-2 0v-1.06A8.004 8.004 0 0 1 4.06 13H3a1 1 0 1 1 0-2h1.06A8.004 8.004 0 0 1 11 4.06V3a1 1 0 0 1 1-1zm0 4a6 6 0 1 0 0 12 6 6 0 0 0 0-12zm0 3a3 3 0 1 1 0 6 3 3 0 0 1 0-6z"/></svg>
        </button>
      </div>
      <div id="searchResults" class="search-results"></div>

      <div class="saved-cities" id="savedCities">
        <div class="saved-cities-label">Your cities</div>
        <ul id="cityList"></ul>
      </div>

      <button id="themeToggle" class="theme-toggle" aria-label="Toggle dark/light theme">
        <span class="theme-toggle-icon">☾</span>
        <span class="theme-toggle-text">Dark mode</span>
      </button>
    </aside>

    <!-- ============ MAIN ============ -->
    <main class="main">

      <!-- day/night sky strip — the signature element -->
      <div class="skystrip" id="skystrip">
        <svg id="skystripSvg" viewBox="0 0 1000 60" preserveAspectRatio="none"></svg>
        <div class="skystrip-labels">
          <span id="sunriseLabel">--:--</span>
          <span id="nowLabel">now</span>
          <span id="sunsetLabel">--:--</span>
        </div>
      </div>

      <div id="loadingState" class="state-msg">Loading weather…</div>
      <div id="errorState" class="state-msg error-msg" hidden></div>

      <div id="weatherContent" hidden>

        <!-- HERO / CURRENT CONDITIONS -->
        <section class="hero">
          <div class="hero-main">
            <div class="hero-icon" id="heroIcon"></div>
            <div class="hero-temp-block">
              <div class="hero-temp"><span id="heroTemp">--</span><span class="deg">°</span></div>
              <div class="hero-place" id="heroPlace">—</div>
              <div class="hero-condition" id="heroCondition">—</div>
            </div>
          </div>

          <div class="hero-stats">
            <div class="stat">
              <span class="stat-label">Feels like</span>
              <span class="stat-value"><span id="statFeelsLike">--</span>°</span>
            </div>
            <div class="stat">
              <span class="stat-label">Humidity</span>
              <span class="stat-value"><span id="statHumidity">--</span>%</span>
            </div>
            <div class="stat">
              <span class="stat-label">Wind</span>
              <span class="stat-value"><span id="statWind">--</span> km/h</span>
            </div>
            <div class="stat">
              <span class="stat-label">UV index</span>
              <span class="stat-value"><span id="statUv">--</span> <span id="statUvLabel" class="stat-sub"></span></span>
            </div>
            <div class="stat">
              <span class="stat-label">Sunrise</span>
              <span class="stat-value" id="statSunrise">--:--</span>
            </div>
            <div class="stat">
              <span class="stat-label">Sunset</span>
              <span class="stat-value" id="statSunset">--:--</span>
            </div>
          </div>
        </section>

        <!-- HOURLY -->
        <section class="panel">
          <h2 class="panel-title">Next 24 hours</h2>
          <div class="hourly-strip" id="hourlyStrip"></div>
        </section>

        <!-- 7 DAY -->
        <section class="panel">
          <h2 class="panel-title">7-day forecast</h2>
          <div class="daily-list" id="dailyList"></div>
        </section>

        <!-- RADAR -->
        <section class="panel">
          <div class="panel-header-row">
            <h2 class="panel-title">Rain radar</h2>
            <button id="radarToggle" class="link-btn">Show map</button>
          </div>
          <div id="radarWrap" class="radar-wrap" hidden>
            <div id="radarMap" class="radar-map"></div>
            <div class="radar-controls">
              <button id="radarPlay" class="link-btn">▶ Play</button>
              <input id="radarSlider" type="range" min="0" max="0" value="0" />
              <span id="radarTime" class="radar-time">--:--</span>
            </div>
          </div>
        </section>

      </div>
    </main>
  </div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="script.js"></script>
</body>
</html>
